<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: transparent;
        color: #94a3b8;
        padding: 16px;
        font-size: 12px;
      }

      .mf-header {
        margin-bottom: 20px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      <!-- Cognitive State Display -->
  <div id="cognitive-banner" style="
  display: none;
  margin-bottom: 14px;
  padding: 8px 10px;
  border-radius: 8px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.2);
  font-size: 10px;
  color: #818cf8;
">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span id="cognitive-label">// cognitive state</span>
    <span id="cognitive-confidence" style="color:#334155"></span>
  </div>
  <div id="cognitive-state" style="font-size:13px; font-weight:700; margin-top:4px; color:#e2e8f0;">
    detecting...
  </div>
</div>


      .mf-logo {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.5px;
        line-height: 1;
        margin-bottom: 4px;
      }

      .mf-logo span {
        color: #6366f1;
      }

      .mf-tagline {
        font-size: 10px;
        color: #334155;
        letter-spacing: 0.08em;
      }

      /* Section label */
      .mf-label {
        font-size: 9px;
        font-weight: 600;
        color: #334155;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      /* Mode buttons */
      .mf-mode-row {
        display: flex;
        gap: 6px;
        margin-bottom: 14px;
      }

      .mf-mode-btn {
        flex: 1;
        padding: 8px 6px;
        border-radius: 8px;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        transition: all 0.15s ease;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: #475569;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      .mf-mode-btn.active-guide {
        background: rgba(99, 102, 241, 0.12);
        border-color: rgba(99, 102, 241, 0.35);
        color: #818cf8;
      }

      .mf-mode-btn.active-show {
        background: rgba(34, 211, 238, 0.08);
        border-color: rgba(34, 211, 238, 0.25);
        color: #22d3ee;
      }

      /* Burnout selector */
      .mf-burnout-row {
        display: flex;
        gap: 5px;
        margin-bottom: 14px;
      }

      .mf-burnout-btn {
        flex: 1;
        padding: 7px 4px;
        border-radius: 7px;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.04em;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: #334155;
        transition: all 0.15s ease;
        text-align: center;
      }

      .mf-burnout-btn.active-low {
        background: rgba(34, 211, 238, 0.08);
        border-color: rgba(34, 211, 238, 0.25);
        color: #22d3ee;
      }

      .mf-burnout-btn.active-mid {
        background: rgba(245, 158, 11, 0.08);
        border-color: rgba(245, 158, 11, 0.25);
        color: #f59e0b;
      }

      .mf-burnout-btn.active-high {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.25);
        color: #ef4444;
      }

      /* Divider */
      .mf-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.04);
        margin: 14px 0;
      }

      /* Inputs */
      textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.02);
        color: #e2e8f0;
        font-size: 11px;
        resize: none;
        outline: none;
        font-family: "JetBrains Mono", monospace;
        transition: border-color 0.15s ease;
        margin-bottom: 10px;
        line-height: 1.6;
      }

      textarea::placeholder {
        color: #1e293b;
      }

      textarea:focus {
        border-color: rgba(99, 102, 241, 0.3);
        background: rgba(99, 102, 241, 0.02);
      }

      #code-input {
        color: #64748b;
        font-size: 10px;
      }

      /* Ask button */
      #ask-btn {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.08em;
        transition: all 0.15s ease;
        border: none;
        margin-bottom: 14px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        box-shadow: 0 2px 12px rgba(99, 102, 241, 0.25);
      }

      #ask-btn:hover {
        box-shadow: 0 2px 20px rgba(99, 102, 241, 0.4);
      }
      #ask-btn:disabled {
        background: rgba(99, 102, 241, 0.15);
        color: #6366f1;
        box-shadow: none;
        cursor: not-allowed;
      }

      /* Error */
      #error-area {
        display: none;
        padding: 10px;
        background: rgba(239, 68, 68, 0.06);
        border: 1px solid rgba(239, 68, 68, 0.15);
        border-radius: 8px;
        color: #ef4444;
        font-size: 10px;
        margin-bottom: 10px;
        line-height: 1.5;
      }

      /* Response */
      #response-area {
        display: none;
      }

      .mf-response-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 10px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-bottom: none;
        border-radius: 8px 8px 0 0;
        font-size: 9px;
        letter-spacing: 0.08em;
      }

      .mf-response-mode {
        color: #475569;
      }

      .mf-badge {
        font-size: 9px;
        padding: 2px 7px;
        border-radius: 20px;
        font-weight: 600;
      }

      .badge-grounded {
        background: rgba(34, 211, 238, 0.08);
        color: #22d3ee;
        border: 1px solid rgba(34, 211, 238, 0.2);
      }

      .badge-general {
        background: rgba(99, 102, 241, 0.08);
        color: #818cf8;
        border: 1px solid rgba(99, 102, 241, 0.2);
      }

      #response-text {
        padding: 12px;
        font-size: 11px;
        line-height: 1.7;
        white-space: pre-wrap;
        max-height: 380px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.015);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 0 0 8px 8px;
        color: #cbd5e1;
        word-break: break-word;
      }

      /* Scrollbar */
      #response-text::-webkit-scrollbar {
        width: 3px;
      }
      #response-text::-webkit-scrollbar-track {
        background: transparent;
      }
      #response-text::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.3);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="mf-header">
      <div class="mf-logo">Mind<span>Flow</span></div>
      <div class="mf-tagline">// ai pair programmer</div>
    </div>

    <!-- Cognitive State Banner -->
    <div
      id="cognitive-banner"
      style="
        display: none;
        margin-bottom: 14px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(99, 102, 241, 0.2);
        font-size: 10px;
        color: #818cf8;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <span style="letter-spacing: 0.08em">// cognitive state</span>
        <span id="cognitive-confidence" style="color: #334155"></span>
      </div>
      <div
        id="cognitive-state"
        style="
          font-size: 13px;
          font-weight: 700;
          margin-top: 4px;
          color: #e2e8f0;
        "
      >
        detecting...
      </div>
    </div>

    <div class="mf-label">mode</div>
    <div class="mf-mode-row">
      <button
        class="mf-mode-btn active-guide"
        id="btn-guide"
        onclick="setMode('guide')"
      >
        ◈ guide me
      </button>
      <button class="mf-mode-btn" id="btn-show" onclick="setMode('show')">
        ◉ show me
      </button>
    </div>

    <div class="mf-label">energy level</div>
    <div class="mf-burnout-row">
      <button
        class="mf-burnout-btn active-low"
        id="btn-low"
        onclick="setBurnout('Low')"
      >
        ▲ fresh
      </button>
      <button
        class="mf-burnout-btn"
        id="btn-mid"
        onclick="setBurnout('Medium')"
      >
        ◆ okay
      </button>
      <button class="mf-burnout-btn" id="btn-high" onclick="setBurnout('High')">
        ▼ tired
      </button>
    </div>

    <div class="mf-divider"></div>

    <div class="mf-label">your question</div>
    <textarea
      id="question-input"
      rows="4"
      placeholder="what are you stuck on?"
    ></textarea>

    <div class="mf-label">code context (optional)</div>
    <textarea
      id="code-input"
      rows="3"
      placeholder="paste broken code here..."
    ></textarea>

    <button id="ask-btn" onclick="askQuestion()">ask mindflow →</button>

    <div id="error-area"></div>

    <div id="response-area">
      <div class="mf-response-header">
        <span class="mf-response-mode" id="mode-label">◈ guide me</span>
        <span class="mf-badge badge-grounded" id="grounded-badge"
          >◆ doc grounded</span
        >
      </div>
      <div id="response-text"></div>
    </div>

    <script>
      const vscode = acquireVsCodeApi();
      let currentMode = "guide";
      let currentBurnout = "Low";

      function setMode(mode) {
        currentMode = mode;
        document.getElementById("btn-guide").className =
          "mf-mode-btn" + (mode === "guide" ? " active-guide" : "");
        document.getElementById("btn-show").className =
          "mf-mode-btn" + (mode === "show" ? " active-show" : "");
      }

      function setBurnout(level) {
        currentBurnout = level;
        document.getElementById("btn-low").className =
          "mf-burnout-btn" + (level === "Low" ? " active-low" : "");
        document.getElementById("btn-mid").className =
          "mf-burnout-btn" + (level === "Medium" ? " active-mid" : "");
        document.getElementById("btn-high").className =
          "mf-burnout-btn" + (level === "High" ? " active-high" : "");
      }

      function askQuestion() {
        const question = document.getElementById("question-input").value.trim();
        if (!question) return;

        const btn = document.getElementById("ask-btn");
        btn.disabled = true;
        btn.textContent = "thinking...";

        document.getElementById("response-area").style.display = "none";
        document.getElementById("error-area").style.display = "none";

        vscode.postMessage({
          command: "ask",
          question: question,
          mode: currentMode,
          burnout_score: currentBurnout,
          code_context: document.getElementById("code-input").value.trim(),
        });
      }

      window.addEventListener("message", (event) => {
        const msg = event.data;
        const btn = document.getElementById("ask-btn");
        btn.disabled = false;
        btn.textContent = "ask mindflow →";

        if (msg.command === "cognitiveState") {
          const banner = document.getElementById("cognitive-banner");
          const stateEl = document.getElementById("cognitive-state");
          const confEl = document.getElementById("cognitive-confidence");

          banner.style.display = "block";
          stateEl.textContent = msg.emoji + " " + msg.state;
          confEl.textContent = Math.round(msg.confidence) + "% confidence";

          // Color by state
          const colors = {
            flow: "rgba(34,211,238,0.08)",
            struggling: "rgba(245,158,11,0.08)",
            fatigued: "rgba(239,130,68,0.08)",
            frustrated: "rgba(239,68,68,0.08)",
          };
          banner.style.background = colors[msg.state] || colors.flow;
        }

        if (msg.command === "response") {
          document.getElementById("response-area").style.display = "block";
          document.getElementById("response-text").textContent = msg.answer;
          document.getElementById("mode-label").textContent =
            msg.mode_used === "guide" ? "◈ guide me" : "◉ show me";

          const badge = document.getElementById("grounded-badge");
          if (msg.grounded) {
            badge.textContent = "◆ doc grounded";
            badge.className = "mf-badge badge-grounded";
          } else {
            badge.textContent = "◇ general guidance";
            badge.className = "mf-badge badge-general";
          }
        }

        if (msg.command === "error") {
          const e = document.getElementById("error-area");
          e.style.display = "block";
          e.textContent = "⚠ " + msg.message;
        }
      });
    </script>
  </body>
</html>
