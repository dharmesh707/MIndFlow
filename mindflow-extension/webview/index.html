<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindFlow</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        padding: 12px;
        color: var(--vscode-foreground);
        background: var(--vscode-sideBar-background);
      }

      /* VS Code CSS variables make our UI match the user's theme automatically */

      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--vscode-foreground);
      }

      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--vscode-descriptionForeground);
        margin-bottom: 6px;
      }

      /* Mode selector — Guide Me / Show Me buttons */
      .mode-selector {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }

      .mode-btn {
        flex: 1;
        padding: 6px;
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
      }

      .mode-btn.active {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }

      /* Burnout score selector */
      .burnout-selector {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
      }

      .burnout-btn {
        flex: 1;
        padding: 5px 4px;
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
      }

      .burnout-btn.active-low {
        background: #2d7a2d;
        color: white;
      }
      .burnout-btn.active-mid {
        background: #a07000;
        color: white;
      }
      .burnout-btn.active-high {
        background: #a03030;
        color: white;
      }

      textarea {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid var(--vscode-input-border);
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
        font-size: 12px;
        resize: vertical;
        font-family: inherit;
        margin-bottom: 8px;
      }

      textarea:focus {
        outline: 1px solid var(--vscode-focusBorder);
      }

      #ask-btn {
        width: 100%;
        padding: 8px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 12px;
      }

      #ask-btn:hover {
        background: var(--vscode-button-hoverBackground);
      }

      #ask-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Response area */
      #response-area {
        display: none;
        border: 1px solid var(--vscode-panel-border);
        border-radius: 4px;
        overflow: hidden;
      }

      #response-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: var(--vscode-panel-background);
        border-bottom: 1px solid var(--vscode-panel-border);
        font-size: 11px;
      }

      #grounded-badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        font-weight: 600;
      }

      .badge-grounded {
        background: #1a4a1a;
        color: #6fcf6f;
      }

      .badge-general {
        background: #3a3a1a;
        color: #cfcf6f;
      }

      #response-text {
        padding: 10px;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 400px;
        overflow-y: auto;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }

      #error-area {
        display: none;
        padding: 8px;
        background: #3a1a1a;
        color: #cf6f6f;
        border-radius: 4px;
        font-size: 12px;
        margin-bottom: 8px;
      }

      .divider {
        height: 1px;
        background: var(--vscode-panel-border);
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <h2>🧠 MindFlow</h2>

    <!-- Mode selector -->
    <div class="section-label">Mode</div>
    <div class="mode-selector">
      <button class="mode-btn active" id="btn-guide" onclick="setMode('guide')">
        💡 Guide Me
      </button>
      <button class="mode-btn" id="btn-show" onclick="setMode('show')">
        ⚡ Show Me
      </button>
    </div>

    <!-- Burnout selector -->
    <div class="section-label">How are you feeling?</div>
    <div class="burnout-selector">
      <button
        class="burnout-btn active-low"
        id="btn-low"
        onclick="setBurnout('Low')"
      >
        🔥 Fresh
      </button>
      <button class="burnout-btn" id="btn-mid" onclick="setBurnout('Medium')">
        😐 Okay
      </button>
      <button class="burnout-btn" id="btn-high" onclick="setBurnout('High')">
        😵 Tired
      </button>
    </div>

    <div class="divider"></div>

    <!-- Question input -->
    <div class="section-label">Your Question</div>
    <textarea
      id="question-input"
      rows="4"
      placeholder="What are you stuck on? e.g. How do I reverse a linked list?"
    ></textarea>

    <!-- Optional code context -->
    <div class="section-label">Paste Your Code (optional)</div>
    <textarea
      id="code-input"
      rows="3"
      placeholder="Paste broken code here for better context..."
    ></textarea>

    <!-- Ask button -->
    <button id="ask-btn" onclick="askQuestion()">Ask MindFlow</button>

    <!-- Error display -->
    <div id="error-area"></div>

    <!-- Response display -->
    <div id="response-area">
      <div id="response-header">
        <span id="mode-label">Guide Me</span>
        <span id="grounded-badge" class="badge-grounded">📚 Doc grounded</span>
      </div>
      <div id="response-text"></div>
    </div>

    <script>
      // VS Code provides this API to communicate with extension.js
      const vscode = acquireVsCodeApi();

      let currentMode = "guide";
      let currentBurnout = "Low";

      function setMode(mode) {
        currentMode = mode;
        document
          .getElementById("btn-guide")
          .classList.toggle("active", mode === "guide");
        document
          .getElementById("btn-show")
          .classList.toggle("active", mode === "show");
      }

      function setBurnout(level) {
        currentBurnout = level;
        // Reset all buttons
        document.getElementById("btn-low").className = "burnout-btn";
        document.getElementById("btn-mid").className = "burnout-btn";
        document.getElementById("btn-high").className = "burnout-btn";
        // Set active
        if (level === "Low")
          document.getElementById("btn-low").className =
            "burnout-btn active-low";
        if (level === "Medium")
          document.getElementById("btn-mid").className =
            "burnout-btn active-mid";
        if (level === "High")
          document.getElementById("btn-high").className =
            "burnout-btn active-high";
      }

      function askQuestion() {
        const question = document.getElementById("question-input").value.trim();
        if (!question) return;

        const codeContext = document.getElementById("code-input").value.trim();

        // Show loading state
        const btn = document.getElementById("ask-btn");
        btn.disabled = true;
        btn.textContent = "Thinking...";

        // Hide previous response and errors
        document.getElementById("response-area").style.display = "none";
        document.getElementById("error-area").style.display = "none";

        // Send message to extension.js
        // extension.js will call the backend and send back the response
        vscode.postMessage({
          command: "ask",
          question: question,
          mode: currentMode,
          burnout_score: currentBurnout,
          code_context: codeContext,
        });
      }

      // Listen for responses sent back from extension.js
      window.addEventListener("message", (event) => {
        const message = event.data;
        const btn = document.getElementById("ask-btn");
        btn.disabled = false;
        btn.textContent = "Ask MindFlow";

        if (message.command === "response") {
          // Show the response
          document.getElementById("response-area").style.display = "block";
          document.getElementById("response-text").textContent = message.answer;
          document.getElementById("mode-label").textContent =
            message.mode_used === "guide" ? "💡 Guide Me" : "⚡ Show Me";

          // Update grounded badge
          const badge = document.getElementById("grounded-badge");
          if (message.grounded) {
            badge.textContent = "📚 Doc grounded";
            badge.className = "badge-grounded";
          } else {
            badge.textContent = "💭 General guidance";
            badge.className = "badge-general";
          }
        }

        if (message.command === "error") {
          const errorArea = document.getElementById("error-area");
          errorArea.style.display = "block";
          errorArea.textContent = "⚠️ " + message.message;
        }
      });
    </script>
  </body>
</html>
